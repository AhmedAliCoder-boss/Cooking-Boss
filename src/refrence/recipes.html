<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Recipes - Cooking Boss</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero section.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/loader.css">
    <link rel="stylesheet" href="css/_all-recipes.css">
  </head>
  <body>
    <!-- Header will be injected here by JavaScript -->
    <div id="app-header"></div>

    <!-- All Recipes Section -->
    <section class="recipes">
      <div class="container">
        <div class="recipes-header">
          <h1>All Recipes</h1>
          <div class="recipes-count" id="recipes-count">Loading recipes...</div>
        </div>

        <!-- Search Results Container -->
        <div id="search-results"></div>

        <!-- Regular Recipes Container -->
        <div class="recipes-container" id="recipes-container">
           
        </div>

        <div class="pagination" id="pagination">
          <!-- Pagination buttons will be added here by JavaScript -->
        </div>
      </div>
    </section>
    
         <div class="modal" id="recipe-modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body" id="modal-body">
                <!-- Recipe details will be loaded here -->
            </div>
        </div>
    </div>
    
    <!-- Footer will be inserted here by the footer component -->
    <div id="footer-container"></div>

    <script type="module">
      import { initHeader } from "./js/components/header.js";
      import { initFooter } from "./js/components/footer.js";
      import { renderRecipes, showLoading, showError } from "./js/ui.js";
      import { fetchPaginatedRecipes, searchByCategory } from "./js/api.js";
      import { initSearch } from "./js/search.js";

      // Constants
      const RECIPES_PER_PAGE = 12;
      let currentPage = 1;
      let totalPages = 1;
      let totalRecipes = 0;

      // Get URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const category = urlParams.get("category");

      // Track if we're in category view
      let isCategoryView = false;

      // Initialize the application
      document.addEventListener("DOMContentLoaded", async () => {
        // Initialize header
        initHeader(document.body);

        // Initialize footer
        const footerContainer = document.getElementById("footer-container");
        if (footerContainer) {
          initFooter(footerContainer);
        }

        // Set current page from URL or default to 1
        currentPage = parseInt(urlParams.get("page")) || 1;

        
        // Set category view flag
        isCategoryView = !!urlParams.get("category");

        // Initialize search functionality only if not in category view
        if (!isCategoryView) {
          const searchInput = document.getElementById("hero-search");
          if (searchInput) {
            initSearch();
          }
        }

        // Load recipes
        await loadRecipes();

        // Add event listener for pagination
        const pagination = document.getElementById("pagination");
        if (pagination) {
          pagination.addEventListener("click", handlePagination);
        }

        // Listen for URL changes to detect when leaving category view
        let lastUrl = location.href;
        new MutationObserver(() => {
          const url = location.href;
          if (url !== lastUrl) {
            lastUrl = url;
            const newCategory = new URL(url).searchParams.get("category");
            isCategoryView = !!newCategory;
            if (!isCategoryView) {
              // Re-initialize search when leaving category view
              const searchInput = document.getElementById("hero-search");
              if (searchInput) {
                initSearch();
              }
            }
          }
        }).observe(document, { subtree: true, childList: true });
      });

      // Load recipes
      async function loadRecipes() {
        // Don't load if we're in a search
        if (
          window.location.search.includes("search=") &&
          !window.location.search.includes("category=")
        ) {
          return;
        }

        const recipesContainer = document.getElementById("recipes-container");
        const recipesCount = document.getElementById("recipes-count");
        const currentCategory = new URLSearchParams(window.location.search).get(
          "category"
        );

        try {
          showLoading();

          let recipes, total;

          if (currentCategory) {
            // Load recipes by category
            recipes = await searchByCategory(currentCategory);
            total = recipes.length;
            // Update page title and heading
            const categoryName =
              currentCategory.charAt(0).toUpperCase() +
              currentCategory.slice(1);
            document.title = `${categoryName} Recipes - Cooking Boss`;
            const h1 = document.querySelector("h1");
            if (h1) h1.textContent = `${categoryName} Recipes`;
          } else {
            // Load all recipes with pagination
            const result = await fetchPaginatedRecipes(
              currentPage,
              RECIPES_PER_PAGE
            );
            recipes = result.recipes;
            total = result.pagination.totalItems;
            totalPages = result.pagination.totalPages;
          }

          totalRecipes = total;

          // Render recipes
          if (recipesContainer) {
            recipesContainer.innerHTML = ""; // Clear container
            renderRecipes(recipes, recipesContainer);
          }

          // Update recipes count
          if (recipesCount) {
            recipesCount.textContent = `Showing ${recipes.length} of ${total} recipes`;
          }

          // Update pagination
          updatePagination();

          // Only update URL if we're not in category view to prevent reloads
          if (!isCategoryView) {
            updateURL();
          }
        } catch (error) {
          console.error("Error loading recipes:", error);
          showError("Failed to load recipes. Please try again later.");
        }
      }

      // Update pagination controls
      function updatePagination() {
        const pagination = document.getElementById("pagination");
        if (!pagination) return;

        // Don't show pagination for category view
        if (category) {
          pagination.style.display = "none";
          return;
        }

        pagination.style.display = "flex";
        pagination.innerHTML = "";

        // Previous button
        const prevButton = document.createElement("button");
        prevButton.innerHTML = "&laquo; Previous";
        prevButton.disabled = currentPage === 1;
        prevButton.onclick = () => {
          if (currentPage > 1) {
            currentPage--;
            loadRecipes();
          }
        };
        pagination.appendChild(prevButton);

        // Page numbers
        const maxPages = 5;
        let startPage = Math.max(1, currentPage - Math.floor(maxPages / 2));
        let endPage = startPage + maxPages - 1;

        if (endPage > totalPages) {
          endPage = totalPages;
          startPage = Math.max(1, endPage - maxPages + 1);
        }

        // First page
        if (startPage > 1) {
          const firstButton = createPageButton(1);
          pagination.appendChild(firstButton);
          if (startPage > 2) {
            const ellipsis = document.createElement("span");
            ellipsis.textContent = "...";
            pagination.appendChild(ellipsis);
          }
        }

        // Page numbers
        for (let i = startPage; i <= endPage; i++) {
          const pageButton = createPageButton(i);
          if (i === currentPage) {
            pageButton.classList.add("active");
          }
          pagination.appendChild(pageButton);
        }

        // Last page
        if (endPage < totalPages) {
          if (endPage < totalPages - 1) {
            const ellipsis = document.createElement("span");
            ellipsis.textContent = "...";
            pagination.appendChild(ellipsis);
          }
          const lastButton = createPageButton(totalPages);
          pagination.appendChild(lastButton);
        }

        // Next button
        const nextButton = document.createElement("button");
        nextButton.innerHTML = "Next &raquo;";
        nextButton.disabled = currentPage >= totalPages;
        nextButton.onclick = () => {
          if (currentPage < totalPages) {
            currentPage++;
            loadRecipes();
          }
        };
        pagination.appendChild(nextButton);

        // Scroll to top when changing pages
        window.scrollTo(0, 0);
      }

      // Helper function to create page buttons
      function createPageButton(page) {
        const button = document.createElement("button");
        button.textContent = page;
        if (page === currentPage) {
          button.classList.add("active");
        }
        button.onclick = (e) => {
          e.preventDefault();
          if (page !== currentPage) {
            currentPage = page;
            ;
          }
        };
        return button;
      }

      // Update URL with current state
      function updateURL() {
        const params = new URLSearchParams();
        if (category) params.set("category", category);
        if (currentPage > 1) params.set("page", currentPage);

        const newURL = `${window.location.pathname}?${params.toString()}`;
        window.history.pushState({}, "", newURL);
      }

      // Update recipes count
      function updateRecipesCount() {
        const recipesCount = document.getElementById("recipes-count");
        recipesCount.textContent = `${totalRecipes} recipes found`;
      }

      // Handle pagination button clicks
      function handlePagination(event) {
        event.preventDefault();
        const button = event.target.closest("button");
        if (!button) return;

        const action = button.dataset.action;
        if (action === "prev" && currentPage > 1) {
          currentPage--;
        } else if (action === "next" && currentPage < totalPages) {
          currentPage++;
        } else if (action === "page") {
          const page = parseInt(button.dataset.page, 10);
          if (!isNaN(page)) currentPage = page;
        }

        updateURL();
        loadRecipes();
      }
    </script>
    <!-- Recipe Modal -->
    <div id="recipe-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="modal-body"></div>
      </div>
    </div>
    <div class="modal-overlay"></div>

    <!-- YouTube IFrame API -->
    <script>
      // Load the YouTube IFrame API
      var tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      var firstScriptTag = document.getElementsByTagName("script")[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    </script>
    <script src="js/main.js" type="module"></script>
    <script src="js/search.js" type="module"></script>
    <script src="js/pwa-install.js" type="module"></script>
    <script src="js/modal.js" type="module"></script>
    
  </body>
</html>
