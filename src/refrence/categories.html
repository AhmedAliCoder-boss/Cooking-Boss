<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Categories - Cooking Boss</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero section.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/loader.css">
    <link rel="stylesheet" href="css/_categories.css">>
</head>
<body>
    <!-- Header will be injected here by JavaScript -->
    <div id="app-header"></div>

    <!-- Categories Section -->
    <section class="categories-section">
        <div class="container">
            <div class="section-header">
                <h1>Recipe Categories</h1>
                <p>Browse our wide range of delicious recipe categories. Click on any category to explore recipes.</p>
            </div>
            
            <div id="loading-container" class="loading-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading categories...</p>
                </div>
            </div>
            
            <div id="categories-container" class="categories-grid">
                <!-- Categories will be loaded here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer will be injected here by JavaScript -->
    <div id="footer-container"></div>

    <script type="module">
        import { initHeader } from './js/components/header.js';
        import { initFooter } from './js/components/footer.js';
        
        // Initialize header and footer
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize header
            initHeader(document.body);
            
            // Initialize footer
            const footerContainer = document.getElementById('footer-container');
            if (footerContainer) {
                initFooter(footerContainer);
            }
            
            // Load categories
            loadCategories();
        });
        
        // List of common food categories with their corresponding images
        const categories = [
            { name: 'Beef', image: 'https://www.themealdb.com/images/category/beef.png' },
            { name: 'Breakfast', image: 'https://www.themealdb.com/images/category/breakfast.png' },
            { name: 'Chicken', image: 'https://www.themealdb.com/images/category/chicken.png' },
            { name: 'Dessert', image: 'https://www.themealdb.com/images/category/dessert.png' },
            { name: 'Lamb', image: 'https://www.themealdb.com/images/category/lamb.png' },
            { name: 'Miscellaneous', image: 'https://www.themealdb.com/images/category/miscellaneous.png' },
            { name: 'Pasta', image: 'https://www.themealdb.com/images/category/pasta.png' },
            { name: 'Pork', image: 'https://www.themealdb.com/images/category/pork.png' },
            { name: 'Seafood', image: 'https://www.themealdb.com/images/category/seafood.png' },
            { name: 'Side', image: 'https://www.themealdb.com/images/category/side.png' },
            { name: 'Starter', image: 'https://www.themealdb.com/images/category/starter.png' },
            { name: 'Vegan', image: 'https://www.themealdb.com/images/category/vegan.png' },
            { name: 'Vegetarian', image: 'https://www.themealdb.com/images/category/vegetarian.png' },
            { name: 'Goat', image: 'https://www.themealdb.com/images/category/goat.png' },
        ];
        
        // Function to load and display categories
        function loadCategories() {
            const container = document.getElementById('categories-container');
            const loadingContainer = document.getElementById('loading-container');
            
            if (!container) return;
            
            // Clear loading state
            if (loadingContainer) {
                loadingContainer.style.display = 'none';
            }
            
            // Generate category cards
            container.innerHTML = categories.map(category => `
                <div class="category-card">
                    <img src="${category.image}" alt="${category.name}" class="category-img" 
                         onerror="this.src='https://via.placeholder.com/300x200?text=${encodeURIComponent(category.name)}';">
                    <div class="category-info">
                        <h3>${category.name}</h3>
                        <p>Explore our delicious ${category.name.toLowerCase()} recipes</p>
                    </div>
                    <a href="recipes.html?category=${encodeURIComponent(category.name.toLowerCase())}" class="category-link" aria-label="View ${category.name} recipes"></a>
                </div>
            `).join('');
        }
        
        // Update active nav link
        function updateActiveNavLink() {
            const currentPage = 'categories';
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                if (link.dataset.page === currentPage) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }
    </script>
</body>
</html>
