<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorites - Cooking Boss</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero section.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/_recipes.css">
    <link rel="stylesheet" href="css/_favorites.css">
</head>
<body>
    <!-- Header will be injected here by JavaScript -->
    <div id="app-header"></div>
    
    <!-- Main content container -->
    <main class="main-content">

    <!-- Favorites Section -->
    <section class="favorites">
        <div class="container">
            <div class="favorites-header">
                <h1>My Favorite Recipes</h1>
            </div>
            
            <div class="favorites-container" id="favorites-container">
                <!-- Favorites will be rendered here by JavaScript -->
            </div>
        </div>
    </section>
    
    <!-- Footer will be inserted here by the footer component -->
    <footer id="app-footer"></footer>

    <script type="module">
        import { initHeader } from './js/components/header.js';
        import { initFooter } from './js/components/footer.js';
        import { favorites, renderFavorites, removeFromFavorites } from './js/favorites.js';
        
        // Import the modal functions
        let renderRecipeModal, openModal;
        
        // Load modal functions when needed
        async function loadModalFunctions() {
            if (!renderRecipeModal || !openModal) {
                const modalModule = await import('./js/modal.js');
                renderRecipeModal = modalModule.renderRecipeModal;
                openModal = modalModule.openModal;
            }
        }

        // Function to show recipe details in modal
        async function showRecipeDetails(recipeId) {
            try {
                // Ensure modal exists in the DOM
                let modal = document.getElementById('recipe-modal');
                if (!modal) {
                    // Create modal if it doesn't exist
                    modal = document.createElement('div');
                    modal.id = 'recipe-modal';
                    modal.className = 'modal';
                    modal.innerHTML = `
                        <div class="modal-content">
                            <span class="close-btn">&times;</span>
                            <div class="modal-body" id="modal-body">
                        </div>
                    `;
                    document.body.appendChild(modal);
                    
                    // Add close button functionality
                    const closeBtn = modal.querySelector('.close-btn');
                    if (closeBtn) {
                        closeBtn.addEventListener('click', () => {
                            modal.style.display = 'none';
                        });
                    }
                    
                    // Close modal when clicking outside
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) {
                            modal.style.display = 'none';
                        }
                    });
                }
                
                // Show loading state
                const modalBody = modal.querySelector('#modal-body');
                if (modalBody) {
                    modalBody.innerHTML = '<div class="loading">Loading recipe details...</div>';
                }
                modal.style.display = 'block';
                
                // Load modal functions
                await loadModalFunctions();
                
                // Find the recipe in favorites
                const recipe = favorites.find(fav => fav.idMeal === recipeId);
                
                if (recipe) {
                    // If we already have full recipe details, show them
                    if (recipe.strInstructions) {
                        if (renderRecipeModal) {
                            renderRecipeModal(recipe);
                            openModal();
                        } else {
                            throw new Error('Modal functions not loaded');
                        }
                    } else {
                        // Otherwise, fetch full recipe details
                        const response = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${recipeId}`);
                        const data = await response.json();
                        
                        if (data.meals && data.meals[0]) {
                            if (renderRecipeModal) {
                                renderRecipeModal(data.meals[0]);
                                openModal();
                            } else {
                                throw new Error('Modal functions not loaded');
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('Error showing recipe details:', error);
                const modal = document.getElementById('recipe-modal');
                if (modal) {
                    const modalBody = modal.querySelector('#modal-body') || modal;
                    modalBody.innerHTML = `
                        <div class="error-message">
                            <p>Failed to load recipe details. Please try again.</p>
                            <button onclick="this.closest('.modal').style.display='none'">Close</button>
                        </div>`;
                } else {
                    alert('Failed to load recipe details. Please try again.');
                }
            }
        }

        // Event delegation for favorites container
        function handleFavoritesContainerClick(e) {
            const favoritesContainer = document.getElementById('favorites-container');
            if (!favoritesContainer) return;
            
            // First, check if it's a remove button click
            const removeBtn = e.target.closest('.remove-favorite');
            if (removeBtn) {
                e.preventDefault();
                e.stopPropagation();
                const recipeId = removeBtn.dataset.id;
                if (recipeId) {
                    removeFromFavorites(recipeId);
                    renderFavorites();
                    updateFavoritesCount();
                }
                return;
            }
            
            // Then check if it's a recipe card click
            const clickedRecipe = e.target.closest('.favorite-recipe');
            if (clickedRecipe) {
                const recipeId = clickedRecipe.dataset.id;
                if (recipeId) {
                    showRecipeDetails(recipeId);
                }
            }
        }

        // Update favorites count in the header
        function updateFavoritesCount() {
            // Update the favorites count in the header
            const favoritesCount = document.getElementById('favorites-total');
            if (favoritesCount) {
                favoritesCount.textContent = favorites.length;
            }
            
            // Also update the count in the header if it exists
            const headerCount = document.querySelector('.header-actions .favorites-count');
            if (headerCount) {
                headerCount.textContent = favorites.length;
            }
            
            // Update the document title with the count
            document.title = favorites.length > 0 
                ? `(${favorites.length}) My Favorites - Cooking Boss` 
                : 'My Favorites - Cooking Boss';
        }
        
        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            initHeader();
            // Initialize footer with the footer container
            const footerContainer = document.getElementById('app-footer');
            if (footerContainer && typeof initFooter === 'function') {
                initFooter(footerContainer);
            }
            
            // Update favorites count
            updateFavoritesCount();
            
            // Initial render of favorites
            renderFavorites();
            
            // Add event delegation for the favorites container
            const favoritesContainer = document.getElementById('favorites-container');
            if (favoritesContainer) {
                favoritesContainer.addEventListener('click', handleFavoritesContainerClick);
            }
            
            // Listen for favorites updates from other parts of the app
            window.addEventListener('favoritesUpdated', updateFavoritesCount);
            
            // Update header active state
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                link.classList.remove('active');
                if (href === 'favorites.html' && currentPath.endsWith('favorites.html')) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
