<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Print Template</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .print-container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .recipe-header {
      position: relative;
      height: 350px;
      overflow: hidden;
    }

    .recipe-header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .recipe-header-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
      padding: 40px;
      color: white;
    }

    .recipe-category {
      display: inline-block;
      background: #ff6b6b;
      color: white;
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }

    .recipe-title {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .recipe-area {
      font-size: 18px;
      opacity: 0.9;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .recipe-content {
      padding: 40px;
    }

    .recipe-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 14px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .section-title {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .section-title::before {
      content: '';
      width: 5px;
      height: 35px;
      background: linear-gradient(to bottom, #ff6b6b, #ff8e8e);
      border-radius: 3px;
    }

    .ingredients-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 40px;
    }

    .ingredient-item {
      background: #f8f9fa;
      padding: 15px 20px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s ease;
    }

    .ingredient-item:hover {
      background: #e9ecef;
      transform: translateX(5px);
    }

    .ingredient-checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #ff6b6b;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .ingredient-text {
      font-size: 16px;
      color: #333;
    }

    .instructions-list {
      counter-reset: step;
    }

    .instruction-item {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
      align-items: flex-start;
    }

    .instruction-number {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
      counter-increment: step;
    }

    .instruction-number::before {
      content: counter(step);
    }

    .instruction-text {
      font-size: 16px;
      line-height: 1.8;
      color: #444;
      padding-top: 10px;
    }

    .recipe-footer {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 2px dashed #e9ecef;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    .recipe-footer strong {
      color: #ff6b6b;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .print-container {
        box-shadow: none;
        border-radius: 0;
      }

      .stat-card:hover {
        transform: none;
      }

      .ingredient-item:hover {
        background: #f8f9fa;
        transform: none;
      }
    }

    @media (max-width: 768px) {
      .recipe-stats {
        grid-template-columns: 1fr;
      }

      .ingredients-list {
        grid-template-columns: 1fr;
      }

      .recipe-title {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="print-container">
    <div class="recipe-header">
      <img id="recipe-image" src="" alt="Recipe Image">
      <div class="recipe-header-overlay">
        <span class="recipe-category" id="recipe-category">Category</span>
        <h1 class="recipe-title" id="recipe-title">Recipe Name</h1>
        <div class="recipe-area">
          <span id="recipe-area">Area</span>
        </div>
      </div>
    </div>

    <div class="recipe-content">
      <div class="recipe-stats">
        <div class="stat-card">
          <div class="stat-icon">⏱️</div>
          <div class="stat-value" id="recipe-time">30</div>
          <div class="stat-label">Minutes</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <div class="stat-value" id="recipe-servings">4</div>
          <div class="stat-label">Servings</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🔥</div>
          <div class="stat-value" id="recipe-calories">450</div>
          <div class="stat-label">Calories</div>
        </div>
      </div>

      <h2 class="section-title">Ingredients</h2>
      <div class="ingredients-list" id="ingredients-list">
        <!-- Ingredients will be populated here -->
      </div>

      <h2 class="section-title">Instructions</h2>
      <div class="instructions-list" id="instructions-list">
        <!-- Instructions will be populated here -->
      </div>

      <div class="recipe-footer">
        Printed from <strong>Cooking Boss</strong> - Your Ultimate Recipe Companion
      </div>
    </div>
  </div>

  <script>
    // Function to populate recipe data
    function populateRecipe(recipeData) {
      document.getElementById('recipe-image').src = recipeData.image;
      document.getElementById('recipe-category').textContent = recipeData.category;
      document.getElementById('recipe-title').textContent = recipeData.title;
      document.getElementById('recipe-area').textContent = recipeData.area;
      document.getElementById('recipe-time').textContent = recipeData.time;
      document.getElementById('recipe-servings').textContent = recipeData.servings;
      document.getElementById('recipe-calories').textContent = recipeData.calories;

      // Populate ingredients
      const ingredientsList = document.getElementById('ingredients-list');
      ingredientsList.innerHTML = '';
      recipeData.ingredients.forEach(ingredient => {
        const item = document.createElement('div');
        item.className = 'ingredient-item';
        item.innerHTML = `
          <div class="ingredient-checkbox"></div>
          <span class="ingredient-text">${ingredient}</span>
        `;
        ingredientsList.appendChild(item);
      });

      // Populate instructions
      const instructionsList = document.getElementById('instructions-list');
      instructionsList.innerHTML = '';
      recipeData.instructions.forEach(instruction => {
        const item = document.createElement('div');
        item.className = 'instruction-item';
        item.innerHTML = `
          <div class="instruction-number"></div>
          <p class="instruction-text">${instruction}</p>
        `;
        instructionsList.appendChild(item);
      });
    }

    // Listen for recipe data from parent window
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'RECIPE_DATA') {
        populateRecipe(event.data.recipe);
      }
    });
  </script>
</body>
</html>
